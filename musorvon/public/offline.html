<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>МусорВон — Нет связи</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F7FAF6;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        text-align: center;
        max-width: 320px;
      }
      .icon {
        width: 96px;
        height: 96px;
        background: #E6F4EA;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
      }
      h1 { font-size: 24px; font-weight: 700; color: #1A1F1A; }
      p { font-size: 15px; color: #7F8A80; line-height: 1.5; }
      button {
        background: #33A65A;
        color: white;
        border: none;
        border-radius: 16px;
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <div>
        <h1>Нет подключения</h1>
        <p style="margin-top:8px">
          Проверьте интернет-соединение и попробуйте снова.
        </p>
      </div>
      <button onclick="window.location.reload()">Попробовать снова</button>
    </div>
  </body>
</html>
